name: Deploy To Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lightsail-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Create deployment bundle
        run: |
          tar -czf /tmp/deploy.tar.gz \
            backend \
            frontend \
            scripts \
            validation \
            dist \
            example.env \
            README.md

      - name: Upload deployment bundle to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_PORT || 22 }}
          source: /tmp/deploy.tar.gz
          target: /tmp

      - name: Deploy application on Lightsail over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_PORT || 22 }}
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"
            APP_DIR="$HOME/cif-digitisation-platform"
            STAGE_DIR="$HOME/cif-digitisation-platform-staging"
            BUNDLE_PATH="/tmp/deploy.tar.gz"

            rm -rf "$STAGE_DIR"
            mkdir -p "$STAGE_DIR"
            tar -xzf "$BUNDLE_PATH" -C "$STAGE_DIR"

            bash "$STAGE_DIR/scripts/deploy.sh" "$STAGE_DIR" "$APP_DIR"

            rm -rf "$STAGE_DIR"
            rm -f "$BUNDLE_PATH"
